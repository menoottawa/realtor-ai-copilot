[loggers]
keys = "root"

[handlers]
keys = "console"

[formatters]
keys = "standard"

[logger_root]
level = "INFO"
handlers = ["console"]

[handler_console]
class = "logging.StreamHandler"
level = "INFO"
formatter = "standard"
args = "()"

[formatter_standard]
format = "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
datefmt = "%Y-%m-%d %H:%M:%S"
